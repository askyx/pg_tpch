name: Test

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        pg_version: ["13", "14", "15", "16", "17", "18"]

    env:
      CARGO_TERM_COLOR: always
      CARGO_PGRX_VERSION: "0.17.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-test-target-pg${{ matrix.pg_version }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates gnupg lsb-release
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/postgresql.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bison \
            clang \
            flex \
            libclang-dev \
            libicu-dev \
            libreadline-dev \
            zlib1g-dev \
            pkg-config \
            wget \
            xz-utils

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "${CARGO_PGRX_VERSION}" --locked

      - name: Initialize pgrx for selected PostgreSQL version
        run: cargo pgrx init --pg${{ matrix.pg_version }} download

      - name: Run regression tests
        run: cargo pgrx test pg${{ matrix.pg_version }}
