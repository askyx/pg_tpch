name: Package

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        pg_version: ["13", "14", "15", "16", "17", "18"]

    env:
      CARGO_TERM_COLOR: always
      CARGO_PGRX_VERSION: "0.17.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-pg${{ matrix.pg_version }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates gnupg lsb-release
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/postgresql.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            libclang-dev \
            pkg-config \
            postgresql-server-dev-${{ matrix.pg_version }}

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "${CARGO_PGRX_VERSION}" --locked

      - name: Build package
        env:
          PG_CONFIG_PATH: /usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config
          PACKAGE_DIR: dist/pg${{ matrix.pg_version }}
          ARCHIVE_NAME: pg_tpch-pg${{ matrix.pg_version }}-ubuntu22.04-x86_64
        run: |
          cargo pgrx package \
            --release \
            --pg-config "${PG_CONFIG_PATH}" \
            --out-dir "${PACKAGE_DIR}"
          mkdir -p dist/artifacts
          tar -C "${PACKAGE_DIR}" -czf "dist/artifacts/${ARCHIVE_NAME}.tar.gz" .

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pg_tpch-pg${{ matrix.pg_version }}-ubuntu22.04-x86_64
          path: dist/artifacts/pg_tpch-pg${{ matrix.pg_version }}-ubuntu22.04-x86_64.tar.gz

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/artifacts/pg_tpch-pg${{ matrix.pg_version }}-ubuntu22.04-x86_64.tar.gz
